{% extends "base.html" %}
{% block title %}{{ name }} — Blogs{% endblock %}
{% block content %}
<section data-page="blogs">
  <h1>Blogs</h1>
  <ul class="blog-list">
    {% for post in posts %}
    <li>
      <a href="/blogs/{{ post.slug }}.html">{{ post.title }}</a>
      <span class="period">{{ post.date }}</span>
      <p class="details">{{ post.description }}</p>
    </li>
    {% endfor %}
  </ul>
</section>
{% endblock %}
