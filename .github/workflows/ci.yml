name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.67.0

      - name: Run tests
        run: pixi run test

      - name: Lint (check only, no auto-fix)
        run: pixi run ruff check . && pixi run ruff format --check .
